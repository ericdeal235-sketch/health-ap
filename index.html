<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0d0d14"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Health Tracker Pro</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:#0d0d14;color:#fff;font-family:'DM Sans',sans-serif;overflow:hidden;}
    .app{display:flex;flex-direction:column;height:100dvh;position:relative;}
    .bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(124,58,237,0.15) 0%,transparent 70%);pointer-events:none;z-index:0;}
    
    .hdr{padding:13px 16px 10px;padding-top:max(13px,calc(env(safe-area-inset-top)+6px));border-bottom:1px solid rgba(255,255,255,0.06);z-index:2;flex-shrink:0;}
    .hdr .sub{font-size:10px;letter-spacing:0.2em;color:#a78bfa;text-transform:uppercase;}
    .hdr .ttl{font-size:20px;font-weight:800;}

    .page{flex:1;overflow-y:auto;padding:20px 14px 120px;z-index:1;}
    
    .vwrap{width:100%;border-radius:14px;overflow:hidden;border:2px solid rgba(167,139,250,0.4);position:relative;background:#000;aspect-ratio:4/3;}
    video{width:100%;height:100%;object-fit:cover;}
    .vfinder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
    .vfbox{width:180px;height:180px;border:2px solid rgba(167,139,250,0.8);border-radius:20px;box-shadow:0 0 0 9999px rgba(0,0,0,0.4);}
    
    .rcard{background:rgba(167,139,250,0.12);border:1px solid rgba(167,139,250,0.3);border-radius:16px;padding:16px;margin-top:20px;animation:slideUp 0.3s ease-out;}
    .rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
    .rstat{background:rgba(255,255,255,0.05);border-radius:12px;padding:10px;text-align:center;font-weight:700;}
    
    .scanbtn{width:100%;margin-top:16px;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;font-weight:700;font-size:15px;cursor:pointer;box-shadow: 0 4px 15px rgba(124,58,237,0.3);}
    
    .history-sec{margin-top:30px;}
    .h-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);padding:12px;border-radius:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
    
    #profile-screen{position:fixed;inset:0;z-index:500;background:#0d0d14;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
    .sinp{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:14px;color:#fff;font-size:16px;width:100%;margin-bottom:15px;outline:none;}
    
    @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .dots{display:flex;gap:6px;justify-content:center;padding:20px;}
    .dot{width:10px;height:10px;border-radius:50%;background:#a78bfa;animation:pulse 1.2s infinite;}
    @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
  </style>
</head>
<body>

<div class="app">
  <div class="bg-glow"></div>

  <div id="profile-screen">
    <div style="font-size:60px;margin-bottom:10px">✨</div>
    <h1 style="margin-bottom:5px">Health Tracker</h1>
    <p style="color:rgba(255,255,255,0.4);margin-bottom:30px">Your Personal Wellness Companion</p>
    <div style="width:100%;max-width:320px">
      <input id="login-password" type="password" class="sinp" placeholder="Enter PIN"/>
      <button onclick="unlockApp()" class="scanbtn">Unlock App</button>
    </div>
  </div>

  <header class="hdr">
    <div class="sub">AI Vision Engine</div>
    <div class="ttl">Food Lab</div>
  </header>

  <main class="page">
    <div class="vwrap">
      <video id="scanner-video" autoplay playsinline muted></video>
      <div class="vfinder"><div class="vfbox"></div></div>
    </div>
    
    <button id="btn-scan" onclick="captureAndScan()" class="scanbtn">📸 Identify Food</button>
    
    <div id="scan-result"></div>

    <div class="history-sec">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <h3 style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4)">Today's Log</h3>
        <span onclick="clearHistory()" style="font-size:10px;color:#a78bfa;cursor:pointer">Clear All</span>
      </div>
      <div id="history-list"></div>
    </div>
  </main>
</div>

<script>
  // --- CONFIGURATION ---
  const WORKER_URL = 'https://your-worker-name.your-subdomain.workers.dev/'; 

  let stream = null;
  let scanHistory = JSON.parse(localStorage.getItem('foodHistory') || '[]');

  function unlockApp() {
    document.getElementById('profile-screen').style.display = 'none';
    startCamera();
    renderHistory();
  }

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      document.getElementById('scanner-video').srcObject = stream;
    } catch (err) { alert("Enable camera permissions to scan."); }
  }

  async function captureAndScan() {
    const video = document.getElementById('scanner-video');
    const canvas = document.createElement('canvas');
    const btn = document.getElementById('btn-scan');
    
    btn.disabled = true;
    btn.innerText = "Analyzing...";

    const scale = Math.min(1, 800 / video.videoWidth);
    canvas.width = video.videoWidth * scale;
    canvas.height = video.videoHeight * scale;
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
    
    const dataUri = canvas.toDataURL('image/jpeg', 0.8);
    document.getElementById('scan-result').innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

    try {
      const response = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: dataUri })
      });

      const data = await response.json();
      saveToHistory(data);
      renderCard(data);
    } catch (err) {
      document.getElementById('scan-result').innerHTML = `<p style="color:#ef4444">Scan failed. Try again.</p>`;
    } finally {
      btn.disabled = false;
      btn.innerText = "📸 Identify Food";
    }
  }

  function saveToHistory(item) {
    scanHistory.unshift({ ...item, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
    if(scanHistory.length > 10) scanHistory.pop();
    localStorage.setItem('foodHistory', JSON.stringify(scanHistory));
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = scanHistory.map(item => `
      <div class="h-item">
        <div>
          <div style="font-weight:700;text-transform:capitalize">${item.name}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4)">${item.time} • Grade ${item.grade}</div>
        </div>
        <div style="color:#a78bfa;font-weight:700">${item.calories} cal</div>
      </div>
    `).join('');
  }

  function renderCard(data) {
    document.getElementById('scan-result').innerHTML = `
      <div class="rcard">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h2 style="text-transform:capitalize">${data.name}</h2>
          <span style="background:#a78bfa;color:#0d0d14;padding:2px 10px;border-radius:8px;font-weight:900">GRADE ${data.grade}</span>
        </div>
        <div class="rgrid">
          <div class="rstat">${data.calories}<br><small>KCAL</small></div>
          <div class="rstat">${data.protein}g<br><small>PROT</small></div>
          <div class="rstat">${data.carbs}g<br><small>CARB</small></div>
        </div>
      </div>
    `;
  }

  function clearHistory() {
    scanHistory = [];
    localStorage.removeItem('foodHistory');
    renderHistory();
  }
</script>
</body>
</html>
